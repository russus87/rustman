# Compila e pubblica i pacchetti desktop per Linux, Windows e macOS.
# Si attiva quando spingi un tag tipo v0.8.0 (oppure manualmente da GitHub).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Mac Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: ubuntu-22.04      # Linux (.deb, .rpm, .AppImage)
            args: ""
          - platform: windows-latest    # Windows (.exe NSIS, .msi)
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Dipendenze di sistema (solo Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Installa dipendenze frontend
        run: npm install

      - name: Build + bundle + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Rustman ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: "Pacchetti generati automaticamente."
          args: ${{ matrix.args }}

  # Pacchetto Arch Linux (.pkg.tar.zst) creato con makepkg in un container Arch.
  arch:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    container: archlinux:latest
    steps:
      - name: Dipendenze di sistema (Arch)
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git rust nodejs npm \
            webkit2gtk-4.1 libsoup3 gtk3 librsvg openssl

      - uses: actions/checkout@v4

      - name: Build frontend + binario
        run: |
          npm install
          npm run build
          cargo build --release -p app

      - name: Crea il pacchetto con makepkg
        run: |
          VER="${GITHUB_REF_NAME#v}"
          mkdir pkgbuild && cd pkgbuild
          cp ../target/release/app rustman
          cp ../src-tauri/icons/128x128.png rustman.png
          cp ../LICENSE LICENSE
          cat > rustman.desktop <<'DESKTOP'
          [Desktop Entry]
          Name=Rustman
          Comment=Client API desktop in Rust + Tauri + Svelte
          Exec=rustman
          Icon=rustman
          Type=Application
          Categories=Development;Utility;
          DESKTOP
          cat > PKGBUILD <<'PKG'
          pkgname=rustman
          pkgver=__VER__
          pkgrel=1
          pkgdesc="Client API desktop in Rust + Tauri + Svelte"
          arch=('x86_64')
          url="https://github.com/russus87/rustman"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'libsoup3' 'gtk3')
          source=('rustman' 'rustman.png' 'rustman.desktop' 'LICENSE')
          sha256sums=('SKIP' 'SKIP' 'SKIP' 'SKIP')
          package() {
            install -Dm755 "$srcdir/rustman" "$pkgdir/usr/bin/rustman"
            install -Dm644 "$srcdir/rustman.png" "$pkgdir/usr/share/icons/hicolor/128x128/apps/rustman.png"
            install -Dm644 "$srcdir/rustman.desktop" "$pkgdir/usr/share/applications/rustman.desktop"
            install -Dm644 "$srcdir/LICENSE" "$pkgdir/usr/share/licenses/rustman/LICENSE"
          }
          PKG
          sed -i "s/__VER__/${VER}/" PKGBUILD
          # makepkg non gira da root: creiamo un utente dedicato.
          useradd -m builder
          chown -R builder:builder .
          sudo -u builder makepkg -f --nodeps

      - name: Allega lo .zst alla release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Rustman ${{ github.ref_name }}"
          draft: true
          files: pkgbuild/*.pkg.tar.zst
